<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org">

<head th:insert="index :: head"></head>
<body>

    <head th:insert="index :: navbar"></head>
        <!-- messaggio unauthorized -->
        <div th:if="${param.notAuthorized}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong>Access Denied!</strong> You don't have permission to access this page.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${successMessagge}" class="alert alert-success">
            <p th:text="${successMessagge}"></p>
        </div>

        <div th:if="${errorMessage}" class="alert alert-success">
            <p th:text="${errorMessage}"></p>
        </div>

        <div class="container-fluid">
            <div class="row ms-5 vh-100 align-items-centered">
                <div class="col-10">
                    <h1 class="mb5">Welcome to<span class="display-4 fw-bold d-block">New Aulab Chronicle</span></h1>
                </div>
            </div>
        </div>

        <div class="container" th:if="${articles.size() > 0}">
            <div class="row justify-content-center">
                <div class="col-10 mb-5">
                    <h1 class="text-center">Gli ultimi articoli</h1>
                </div>
            </div>
            <div class="row justify-content-center mb-5">
                <div th:each="article:${articles}" class="col-12 col-md-4 d-flex justify-content-center">
                    <div class="card mb-3" style="width: 18rem;">
                        <img th:if="${article.image != null}" th:src="${article.image.path}" class="card-img-top" alt="...">
                        <img th:unless="${article.image != null}" th:src="@{/images/default.jpg}" class="card-img-top" alt="...">

                        <div class="card-body">
                            <h5 class="card-title" th:text="${article.title}"></h5>
                            <p class="card-text" th:text="${article.subtitle}"></p>
                            <p class="card-text" th:text="${article.user.username}"></p>

                            <a th:ref="@{/articles/detail/{id}(id=${article.id})}" class="btn btn-primary">Leggi</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    <head th:insert="~{index :: footer}"></head>
    <script th:replace="~{index :: bootstrapScript}"></script>

</body>
</html>
