<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{index :: head}"></head>
<body>
    <head th:inser="~{index :: navbar}"></head>

    <div class="vh-100">
        <div class="container">
            <div class="row">

                <div class="col-12 my-5 d-flex justify-content-between align-items-center">
                    <div class="d-flex justify-content-between align-items-center flex-grow-1">
                        <h1 th:text="${title}">Inserisci un articolo</h1>
                    </div>
                </div>

                <div class="col-12 my-5">
                    <form th:action="@{/articles}" method="POST" th:objects="${article}" enctype="multipart/form-data">
                        <div class="row mb-3">
                            <div class="col">
                                <label for="articleTitle" class="form-label">Titolo</label>
                                <input id="articleTitle" type="text" class="form-control" th:field="*{title}"
                                placeholder="Inserisci un titolo...">
                                <p th:errors="*{title}" class="text-danger" th:if="${#fields.hasErrors('title')}"></p>
                            </div>

                            <div class="col">
                                <label for="subtitle" class="form-label">Sottotitolo</label>
                                <input id="subtitle" type="text" class="form-control" th:field="*{subtitle}"
                                placeholder="Inserisci un sottotitolo...">
                                <p th:errors="*{subtitle}" class="text-danger" th:if="${#fields.hasErrors('subtitle')}"></p>
                            </div>

                            <div class="col">
                                <label for="body" class="form-label">Articolo</label>
                                <input id="body" type="text" class="form-control" th:field="*{body}"
                                placeholder="Inserisci un testo...">
                                <p th:errors="*{body}" class="text-danger" th:if="${#fields.hasErrors('body')}"></p>
                            </div>

                            <div class="col">
                                <label for="publishDate" class="form-label">Data di pubblicazione</label>
                                <input id="publishDate" type="text" class="form-control" th:field="*{publishDate}"
                                placeholder="yyyyMMdd">
                                <p th:errors="*{publishDate}" class="text-danger" th:if="${#fields.hasErrors('publishDate')}"></p>
                            </div>

                            <div class="col">
                                <label for="category" class="form-label">Categoria</label>
                                <select id="category" th:field="*{category}" class="form-select">
                                    <option th:each="category:${categories}" th:value="${category.id}"
                                    th:text="${category.name}"></option>
                                    <p th:errors="*{category}" class="text-danger" th:if="${#fields.hasErrors('category')}"></p>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="image" class="form-label">Image</label>
                                <input type="file" name="file" id="image" class="form-control"/>
                            </div>

                            <button type="submit" class="btn btn-success">Crea Articolo</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <head th:insert="~{index :: footre}"></head>
    <script th:replace="~{index :: bootstrapScript}"></script>
</body>
</html>
