<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- fragment head -->
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU90FeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
        crossorigin="anonymous">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZmHnM+YV8i59U5AR6csBvApHHNl/vI1Bxoy+cjL3yD9q+UeJc3r2L1Yg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title th:text="${title}">Title</title>
</head>
<!-- fine fragment head -->

<body>
    <!-- inizio navbar -->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="@{/}">Aulab Chronicle</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li sec:authorize="isAuthenticated()" class="nav-item">
                <a class="nav-link" href="/articles/create">Crea un articolo</a>
              </li>
            <li class="nav-item">
                <a class="nav-link" href="/articles">Tutti gli articoli</a>
            </li>
                <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
                    <div class="d-flex">
                        <a class="nav-link" href="/admin/dashboard">Dashboard admin</a>
                        <div class="mt-1" th:if="${careerRequests > 0}">
                            <i class="fas fa-bell fa-1 pt-2"></i>
                            <span class="badge rounded-pill bg-danger text-white px-1" th:text="${careerRequests}"></span>
                        </div>
                    </div>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ROLE_REVISOR')">
                    <div class="d-flex">
                    <a class="nav-link" href="/revisor/dashboard">Dashboard revisore</a>
                    <div class="mt-1" th:if="${articlesToBeRevised > 0}">
                        <i class="fas fa-bell fa-1 pt-2"></i>
                        <span class="badge rounded-pill bg-danger text-white px-1" th:text="${articlesToBeRevised}"></span>
                    </div>
                    </div>
                </li>
            
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false" id="navbarDropdown">
                    Accesso
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <li sec:authorize="isAnonymous()"><a class="dropdown-item" aria-current="page" th:href="@{/register}">Register</a></li>
                        <li sec:authorize="isAnonymous()"><a class="dropdown-item" aria-current="page" th:href="@{/login}">Login</a></li>
                        <li sec:authorize="isAuthenticated()"><a class="dropdown-item" aria-current="page" th:href="@{/logout}">Logout</a></li>
                    </ul>
                </li>
            </ul>
            <div sec:authorize="isAuthenticated()" th:text="'Benvenuto, ' + ${#authentication.principal.fullName()} + '-' + ${#authentication.principal.authorities[0].authority.replace('ROLE_', '')} + '!' ">
            >Benvenuto</div>
        </div>
        <form class="d-flex" th:action="@{/search}" method="get">
            <input class="form-control me-2" type="search" placeholder="Cerca" name="keyword" aria-label="Search">
            <button class="btn btn-outline-success" type="submit">Cerca</button>
        </form>
    </nav>
    <!-- fine navbar -->

    <!-- footer -->
    <footer th:fragment="footer" class="bg-dark text-white pt-4">
        <div class="container">
            <div class="row justify-content-between">
                <!-- info -->
                <div class="col-md-4 mb-3">
                    <a href="/"><h5>Aulab IT</h5></a>"
                </div>
                <!-- info contatti -->
                <div class="col-md-4 mb-3">
                    <h5>Lavora con noi</h5>
                        <a href="@{/operations/career/request}" class="btn btn-primary">Richiedi</a>
                </div>
            </div>
        </div>
        <div class="bg-secondary text-center py-2">
            <p class="mb-0"> 2024 Aulab Jost. All rights reserved.</p>
        </div>
    </footer>
    <!-- fine footer -->

    <!-- fragment script bootstrap -->
    <script th:fragment="bootstrapScript" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
