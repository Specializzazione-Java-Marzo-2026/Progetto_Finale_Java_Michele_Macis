<!DOCTYPE html>
<html lang="en" 
xmlns:th="http://www.thymeleaf.org">

<head th:insert="~{index :: head}"></head>
<body> 
    <head th:insert="~{index :: navbar}"></head>

    <div class="vh-100">
        <br /><br />
        <div class="container">
            <div class="row">
            <div class="col-md-6 offset-md-3">
                <!-- messaggi di errore -->
                <div th:if="${param.error}">
                    <div class="alert alert-danger">Credenziali non valide, riprova!</div>
                </div>
                <!-- messaggi di logout -->
                <div th:if="${param.logout}">
                    <div class="alert alert-success">Logout avvenuto con successo!</div>
                </div>
                <!-- card per il login -->
                <div class="card">
                    <div class="card-header">
                        <h2 class="text-center">Accedi</h2>
                    </div>
                        <div class="card-body">
                            <form method="post" role="form" th:action="@{/login}" class="form-horizontal">
                                <div class="form-group mb-3">
                                    <label class="control-label">Email</label>
                                    <input type="text" class="form-control" id="username" name="username" placeholder="Inserisci l'email">
                                </div>
                                <div class="form-group mb-3">
                                    <label class="control-label">Password</label>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="Inserisci la password">
                                </div>
                                <div class="form-group mb-3">
                                    <button type="submit" class="btn btn-primary">Accedi</button>
                                    <span class="ms-3">Non hai un account? <a href="/register">Registrati</a></span>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <head th:insert="~{index :: footer}"></head>
    <script th:replace="~{index :: bootstrapScript}"></script>
</body>
</html>
